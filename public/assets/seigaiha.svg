<svg xmlns="http://www.w3.org/2000/svg" width="100" height="50" viewBox="0 00 160 80">
  <defs>
    <style>
      .s { fill: none; stroke: #1f2a24; stroke-width: 2; stroke-linecap: round; opacity: .9; }
    </style>

    <defs>
      <clipPath id="clip">
        <rect x="0" y="40" width="160" height="80" />
      </clipPath>
    </defs>

    <!-- Seigaiha: wiederholbares Muster -->
    <pattern id="seigaiha" width="160" height="160" patternUnits="userSpaceOnUse">
      <!-- Eine "Schuppe" = mehrere konzentrische Halbkreise -->
      <!-- Motiv A (oben) -->
      <g transform="translate(80,40)">
        <path class="s" d="M -68 -40 A 77 77 0 0 1 68 -40" />
        <path class="s" d="M -46 -34 A 52 52 0 0 1 46 -34" />
        <path class="s" d="M -32 -25 A 36 36 0 0 1 32 -25" />
        <path class="s" d="M -22 -16 A 25 25 0 0 1 22 -16" />
        <path class="s" d="M -15  -7 A 17 17 0 0 1 15  -7" />
      </g>

      <!-- Motiv B (mitte, versetzt) -->
      <g transform="translate(0,80)">
        <path class="s" d="M -68 -40 A 77 77 0 0 1 68 -40" />
        <path class="s" d="M -46 -34 A 52 52 0 0 1 46 -34" />
        <path class="s" d="M -32 -25 A 36 36 0 0 1 32 -25" />
        <path class="s" d="M -22 -16 A 25 25 0 0 1 22 -16" />
        <path class="s" d="M -14  -7 A 16 16 0 0 1 14  -7" />
      </g>
      <g transform="translate(160,80)">
        <path class="s" d="M -68 -40 A 77 77 0 0 1 68 -40" />
        <path class="s" d="M -46 -34 A 52 52 0 0 1 46 -34" />
        <path class="s" d="M -32 -25 A 36 36 0 0 1 32 -25" />
        <path class="s" d="M -22 -16 A 25 25 0 0 1 22 -16" />
        <path class="s" d="M -14  -7 A 16 16 0 0 1 14  -7" />
      </g>

      <!-- Motiv C (unten) -->
      <g transform="translate(80,120)">
        <path class="s" d="M -68 -40 A 77 77 0 0 1 68 -40" />
        <path class="s" d="M -46 -34 A 52 52 0 0 1 46 -34" />
        <path class="s" d="M -32 -25 A 36 36 0 0 1 32 -25" />
        <path class="s" d="M -22 -16 A 25 25 0 0 1 22 -16" />
        <path class="s" d="M -14  -7 A 16 16 0 0 1 14  -7" />
      </g>
    </pattern>
  </defs>

  <!-- <g clip-path="url(#clip)"> -->
    <rect width="100%" height="100%" fill="url(#seigaiha)" opacity="0.05"/>
  <!-- </g> -->
</svg>


